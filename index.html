<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Μουσική Ορχήστρα - Επιλογή Συσκευής</title>
    <style>
        :root {
            --primary-color: #3c5aa6;
            --success-color: #27ae60;
            --error-color: #e74c3c;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0; 
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            background: #000;
            overflow-x: hidden;
        }

        /* --- DEVICE SELECTION SCREEN (Η ΦΟΡΜΑ) --- */
        #selection-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a1a1a 0%, #000000 100%);
            z-index: 6000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white;
            text-align: center;
        }

        .selection-logo { width: 80%; max-width: 300px; margin-bottom: 30px; }
        
        .selection-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid var(--primary-color);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; gap: 15px;
            width: 85%; max-width: 400px;
        }

        .device-btn {
            padding: 15px;
            border-radius: 15px;
            border: 2px solid white;
            background: transparent;
            color: white;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .device-btn:hover {
            background: var(--primary-color);
            border-color: var(--primary-color);
            transform: scale(1.05);
        }

        /* --- BACKGROUND & SPLASH --- */
        body::before {
            content: ""; 
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url('photos/unnamed.jpg'); 
            background-size: cover; background-position: center; 
            z-index: -2; transition: opacity 0.3s;
        }

        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 5000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .logo-container { text-align: center; z-index: 5002; width: 80%; }
        .main-logo { width: 100%; max-width: 400px; height: auto; }
        .logo-ypotitlos { width: 70%; max-width: 300px; height: auto; margin-top: 2vh; }
        #intro-video { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; z-index: 5001; }
        #enter-app-button { position: absolute; bottom: 5vh; right: 5vw; z-index: 5005; width: 100px; cursor: pointer; opacity: 0; transition: 0.8s; }

        /* --- MAIN UI & GRIDS --- */
        #main-content { display: none; width: 100%; flex-direction: column; align-items: center; }
        .nav-menu { margin: 2vh 0; display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; background: white; padding: 10px; border-radius: 50px; z-index: 1000; }
        .nav-btn { padding: 8px 18px; border-radius: 20px; border: none; font-weight: bold; color: var(--primary-color); cursor: pointer; }
        .nav-btn.active { color: white; background: var(--primary-color); }

        #explore-grid {
            display: grid !important;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 4%; width: 90%; max-width: 1200px; justify-items: center; padding: 3% 2%;
        }

        .instrument-button { 
            background: rgba(0, 0, 0, 0.4); border: 2px solid rgba(255, 255, 255, 0.1); 
            border-radius: 15%; display: flex; flex-direction: column; align-items: center; justify-content: center; 
            padding: 5%; cursor: pointer; backdrop-filter: blur(8px); transition: 0.3s; width: 100%; aspect-ratio: 1/1;
        }

        .instrument-name { color: white; font-weight: bold; margin-top: 5%; font-size: clamp(12px, 1vw, 15px); }

        /* --- MATCH SECTION --- */
        #match-section { background-image: url('photosbox/spilia.jpg') !important; background-size: cover; min-height: 100vh; position: relative; padding-top: 80px; width: 100%; }
        .category-area { display: flex; flex-direction: column; width: 95%; margin: 0 auto; gap: 20px; }
        @media (min-width: 768px) { .category-area { flex-direction: row; height: 70vh; } }
        
        .chest-container { min-height: 180px; background-size: contain; background-repeat: no-repeat; background-position: center; background-image: url('photosbox/box.png'); display: flex; justify-content: center; align-items: center; position: relative; }
        .chest-container.open { background-image: url('photosbox/openbox.png') !important; }
        .chest-content { display: none; width: 100%; height: 100%; position: absolute; flex-wrap: wrap; justify-content: center; padding-top: 40px; overflow-y: auto; }
        .chest-container.open .chest-content { display: flex; }

        /* UTILS */
        .hidden { display: none !important; }
        .match-correct { border: 3px solid var(--success-color) !important; background: rgba(39, 174, 96, 0.5) !important; }
        .match-wrong { border: 3px solid var(--error-color) !important; background: rgba(231, 76, 60, 0.5) !important; }
        .show-klik { opacity: 1 !important; transform: scale(1.1); }
        .visible-app { display: flex !important; }
    </style>
</head>
<body>

    <div id="selection-screen">
        <img src="photos/logo.png" class="selection-logo">
        <div class="selection-container">
            <h2 style="margin-top:0;">Επιλέξτε Συσκευή</h2>
            <button class="device-btn" onclick="startWithDevice('pc')">💻 PC</button>
            <button class="device-btn" onclick="startWithDevice('laptop')">💻 Laptop</button>
            <button class="device-btn" onclick="startWithDevice('mobile')">📱 Tablet / Mobile</button>
        </div>
    </div>

    <div id="splash-screen">
        <video id="intro-video" playsinline>
            <source src="instrument/Background.mp4" type="video/mp4">
        </video>
        <div class="logo-container">
            <img src="photos/logo.png" class="main-logo">
            <img src="photos/ypotitlos.png" class="logo-ypotitlos">
        </div>
        <img src="photos/klik.png" id="enter-app-button" onclick="enterApp()">
    </div>

    <div id="main-content">
        <div class="nav-menu">
            <button id="btn-explore" class="nav-btn active" onclick="showSection('explore')">Εξερεύνηση</button>
            <button id="btn-game" class="nav-btn" onclick="showSection('game')">Κουίζ</button>
            <button id="btn-match" class="nav-btn" onclick="showSection('match')">Ταξινόμηση</button>
            <button id="btn-memory" class="nav-btn" onclick="window.location.href='memory.html'">Memory</button>
        </div>

        <section id="explore-section">
            <div id="explore-grid"></div>
        </section>

        <section id="game-section" class="hidden">
            <div style="color:white; text-align:center; padding:20px;">
                <h2 style="margin:0;">Σκορ: <span id="quiz-score">0</span></h2>
                <button class="nav-btn" style="margin-top:10px;" onclick="replayQuizSound()">Αναπαραγωγή Ήχου 🔊</button>
            </div>
            <div id="game-grid" style="display:flex; flex-wrap:wrap; justify-content:center; gap:10px; padding:10px;"></div>
        </section>

        <section id="match-section" class="hidden">
            <div class="category-area">
                <div id="source-instruments" style="flex:0.3; background:rgba(0,0,0,0.3); border-radius:15px; padding:10px; min-height:100px; display:flex; flex-wrap:wrap; justify-content:center; gap:5px;" ondragover="allow(event)" ondrop="dropToSource(event)"></div>
                <div class="target-containers" id="target-chests"></div>
            </div>
            <div style="padding:20px; display:flex; gap:10px; justify-content:center;">
                <button class="nav-btn" style="background:var(--success-color); color:white;" onclick="checkMatch()">Έλεγχος ✅</button>
                <button class="nav-btn" onclick="initMatch()">Επαναφορά 🔄</button>
            </div>
        </section>
    </div>

    <script>
        const instruments = {
            'violin': { type: 'bowed', name: 'ΒΙΟΛΙ', driveId: "1kzjmLde-86Zva_bWZqNZto2Ry4aXgk6J" },
            'viola':  { type: 'bowed', name: 'ΒΙΟΛΑ', driveId: "1Z05p9bGKMOALMWmb4twg-OEgu4rmqXhs" },
            'Cello':  { type: 'bowed', name: 'ΤΣΕΛΟ', driveId: "1fOlgiCvh4QXYe7V246MI2TrlbTjy_B-S" },
            'Clarinet':  { type: 'woodwind', name: 'ΚΛΑΡΙΝΟ', driveId: "1H0VihbQDqQUbIT7m_d_3m8FtDf0FUIOe" },
            'Contrabass':  { type: 'bowed', name: 'ΚΟΝΤΡΑΜΠΑΣΣΟ', driveId: "1Q5ajw5wOU82K4y7QrmJ7tWxt11z_cL6T" },
            'Cymbal':  { type: 'rhythmic', name: 'ΠΙΑΤΑ', driveId: "1FeDzU6TGQckI0yfDCPL9iMIKUDUQWRYK" }, 
            'English horn':  { type: 'woodwind', name: 'ΑΓΓΛΙΚΟ ΚΟΡΝΟ', driveId: "1IiqjydfVwXec6B7FQIkWUKeWFqe034zK" },
            'fagotto':  { type: 'woodwind', name: 'ΦΑΓΚΟΤΟ', driveId: "1ji_oYvyiCucgGGplCiRrVk1iIBiGKZ3B" },
            'flute':  { type: 'woodwind', name: 'ΦΛΑΟΥΤΟ', driveId: "1j8VUgr_6yT1r9LNuhikU3xdQyY6CQSlo" },
            'Guitar':  { type: 'plucked', name: 'ΚΙΘΑΡΑ', driveId: "1x2SMYe2e07NDRqASZJnEyWsqPToU_rMd" },
            'Harp':  { type: 'plucked', name: 'ΑΡΠΑ', driveId: "1H-jcR5my918L-N3gnP16qh30TsnlWqXF" },
            'Horn':  { type: 'brass', name: 'ΚΟΡΝΟ', driveId: "1y0UgUz8bAbeB9B5FPDUwIVyVjd7_nHM8" },
            'oboe':  { type: 'woodwind', name: 'ΟΜΠΟΕ', driveId: "10qyZ_6DQbDOr58qieoXRWLC5ZQqwRCU8" },
            'Piano':  { type: 'plucked', name: 'ΠΙΑΝΟ', driveId: "1liKGEwEef2T0HnnA_2gNBDk5RXv2wRo6" },
            'piccolo':  { type: 'woodwind', name: 'ΠΙΚΟΛΟ', driveId: "1ZN166lE-7VtXrxiYr79QtWjlRfYmm7b5" },
            'Timpani':  { type: 'melodic', name: 'ΤΥΜΠΑΝΑ', driveId: "1v43FzwzAWSB9ThV1Pwpm6IF-pgjshsCw" },
            'Trombone':  { type: 'brass', name: 'ΤΡΟΜΠΟΝΙ', driveId: "1Nj0zE0M4WXs--FByF70HTeJxLzrQG-rd" },
            'Trumpet':  { type: 'brass', name: 'ΤΡΟΜΠΕΤΑ', driveId: "1sE-kqoF9pWeh0lmw7TQ5eiyPTMud0Wfg" },
            'tuba':  { type: 'brass', name: 'ΤΟΥΜΠΑ', driveId: "1vlyyyfIHO4GIHp60MlayHqR0ceg5cRj9" },
            'vibraphone':  { type: 'melodic', name: 'ΜΕΤΑΛΛΟΦΩΝΟ', driveId: "1yy4Dq5K31ilVCx3rFK0GdPu8e7Q6Rvrq" },
            'Xylophone':  { type: 'melodic', name: 'ΞΥΛΟΦΩΝΟ', driveId: "1Qw0NPoXu5JPJ8u2yhNrISTI7UVnDx48H" }
        };

        const categories = { 'bowed': 'toxota.png', 'woodwind': 'xylina.png', 'brass': 'xalkina.png', 'plucked': 'nykta.png', 'melodic': 'melwdika.png', 'rhythmic': 'rythmika.png' };
        
        let selectedDevice = "";
        let currentQuizKey = "", score = 0, availableKeys = [], quizAudio = new Audio();

        // ΛΕΙΤΟΥΡΓΙΑ ΕΠΙΛΟΓΗΣ ΣΥΣΚΕΥΗΣ
        function startWithDevice(device) {
            selectedDevice = device;
            document.getElementById('selection-screen').style.display = 'none';
            document.getElementById('splash-screen').style.display = 'flex';
            
            const video = document.getElementById('intro-video');
            video.play().catch(e => console.log("Video wait click"));
            
            setTimeout(() => { 
                document.getElementById('enter-app-button').classList.add('show-klik'); 
            }, 2000);
        }

        function enterApp() { 
            const video = document.getElementById('intro-video');
            if (video) video.pause();
            document.getElementById('splash-screen').style.display = 'none'; 
            document.getElementById('main-content').classList.add('visible-app'); 
            showSection('explore'); 
        }

        // Η ΛΟΓΙΚΗ ΤΩΝ SECTIONS ΠΑΡΑΜΕΝΕΙ ΙΔΙΑ
        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if (id === 'match') document.body.classList.add('hide-main-bg');
            else document.body.classList.remove('hide-main-bg');
            document.getElementById(id + '-section').classList.remove('hidden');
            document.getElementById('btn-' + id).classList.add('active');
            
            if(id === 'explore') renderExplore();
            if(id === 'game') renderQuiz();
            if(id === 'match') initMatch();
        }

        function renderExplore() {
            const g = document.getElementById('explore-grid'); g.innerHTML = '';
            Object.keys(instruments).forEach(k => {
                g.innerHTML += `<div class="instrument-button">
                    <img src="photos/${k}.png" style="width:75%; height:55%; object-fit:contain;">
                    <div class="instrument-name">${instruments[k].name}</div>
                    <div style="display:flex; gap:10px; margin-top:10px;">
                        <img src="photos/i.png" style="width:30px; cursor:pointer;" onclick="window.open('${k}Info.html', '_blank')">
                        <img src="photos/play.png" style="width:30px; cursor:pointer;" onclick="playVideo('${k}')">
                    </div>
                </div>`;
            });
        }

        function playVideo(k) { alert("Αναπαραγωγή βίντεο για: " + instruments[k].name); }

        function renderQuiz() {
            const g = document.getElementById('game-grid'); g.innerHTML = '';
            availableKeys = Object.keys(instruments); score = 0;
            document.getElementById('quiz-score').innerText = score;
            Object.keys(instruments).sort(() => Math.random() - 0.5).forEach(k => {
                const b = document.createElement('div'); b.className = 'instrument-button'; b.style.width = "120px";
                b.innerHTML = `<img src="photos/${k}.png" style="width:90%;">`;
                b.onclick = () => {
                    if (k === currentQuizKey) {
                        score++; document.getElementById('quiz-score').innerText = score;
                        b.classList.add('match-correct');
                        availableKeys = availableKeys.filter(key => key !== k);
                        setTimeout(() => { b.style.visibility = 'hidden'; startQuizQuestion(); }, 800);
                    } else { b.classList.add('match-wrong'); setTimeout(() => b.classList.remove('match-wrong'), 800); }
                };
                g.appendChild(b);
            });
            startQuizQuestion();
        }

        function startQuizQuestion() {
            if (availableKeys.length === 0) return;
            currentQuizKey = availableKeys[Math.floor(Math.random() * availableKeys.length)];
            quizAudio.src = `INSTRUMENTS/${currentQuizKey}.m4a`;
            quizAudio.play();
        }

        function replayQuizSound() { quizAudio.play(); }

        function initMatch() {
            const src = document.getElementById('source-instruments'); src.innerHTML = '';
            Object.keys(instruments).filter(k => k !== 'Piano').sort(() => Math.random() - 0.5).forEach(k => {
                const d = document.createElement('div'); d.className = 'instrument-button'; d.style.width = "70px"; d.draggable = true; d.id = 'm-' + k;
                d.innerHTML = `<img src="photos/${k}.png" style="width:100%;">`;
                d.ondragstart = (e) => e.dataTransfer.setData('text', k);
                src.appendChild(d);
            });
            const target = document.getElementById('target-chests'); target.innerHTML = '';
            Object.keys(categories).forEach(type => {
                const chest = document.createElement('div'); chest.className = 'chest-container'; chest.style.backgroundImage = `url('photosbox/${categories[type]}')`;
                const content = document.createElement('div'); content.className = 'chest-content'; content.dataset.type = type;
                content.ondragover = (e) => e.preventDefault();
                content.ondrop = (e) => { e.preventDefault(); const k = e.dataTransfer.getData('text'); content.appendChild(document.getElementById('m-' + k)); };
                chest.onclick = () => chest.classList.toggle('open');
                chest.appendChild(content); target.appendChild(chest);
            });
        }

        function checkMatch() {
            document.querySelectorAll('.chest-container').forEach(c => c.classList.add('open'));
            document.querySelectorAll('.chest-content .instrument-button').forEach(item => {
                const key = item.id.replace('m-', '');
                if (instruments[key].type === item.parentElement.dataset.type) item.classList.add('match-correct');
                else item.classList.add('match-wrong');
            });
        }
        function allow(e) { e.preventDefault(); }
        function dropToSource(e) { e.preventDefault(); const k = e.dataTransfer.getData('text'); document.getElementById('source-instruments').appendChild(document.getElementById('m-' + k)); }
    </script>
</body>
</html>
